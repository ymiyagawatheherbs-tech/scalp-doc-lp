<!DOCTYPE html>
<html lang="ja">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      .slide-container {
        width: 1280px;
        min-height: 720px;
        display: flex;
        background: #F8F6F2;
        font-family: 'Noto Sans JP', sans-serif;
        overflow: hidden;
      }
      .left-panel {
        width: 38%;
        background: #1A2E1A;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .left-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(ellipse at 30% 70%, rgba(45,90,39,0.6) 0%, transparent 60%);
      }
      .botanical-circle {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(184,150,12,0.25);
      }
      .bc1 { width: 320px; height: 320px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
      .bc2 { width: 240px; height: 240px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
      .bc3 { width: 160px; height: 160px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
      .gold-line-h {
        position: absolute;
        height: 1px;
        background: rgba(184,150,12,0.4);
        left: 0; right: 0;
      }
      .left-content {
        position: relative;
        z-index: 2;
        text-align: center;
      }
      .brand-s {
        width: 56px; height: 56px;
        background: #2D5A27;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 16px;
        border: 1px solid rgba(184,150,12,0.5);
      }
      .brand-s span {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px;
        color: #B8960C;
        font-weight: 600;
      }
      .brand-name-jp {
        font-family: 'Shippori Mincho', serif;
        font-size: 22px;
        color: #ffffff;
        letter-spacing: 0.15em;
        margin-bottom: 6px;
      }
      .brand-name-en {
        font-family: 'Cormorant Garamond', serif;
        font-size: 11px;
        color: rgba(184,150,12,0.8);
        letter-spacing: 0.4em;
        text-transform: uppercase;
        margin-bottom: 32px;
      }
      .gold-divider {
        width: 48px; height: 1px;
        background: rgba(184,150,12,0.6);
        margin: 0 auto 24px;
      }
      .presented-by {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 10px;
        color: rgba(255,255,255,0.4);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .company-name {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        color: rgba(255,255,255,0.7);
        letter-spacing: 0.1em;
      }
      .right-panel {
        width: 62%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: 72px;
        padding-right: 72px;
        position: relative;
      }
      .right-panel::after {
        content: '';
        position: absolute;
        top: 0; bottom: 0; left: 0;
        width: 2px;
        background: linear-gradient(to bottom, transparent, #B8960C 30%, #B8960C 70%, transparent);
      }
      .label-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #e8f5e3;
        border: 1px solid #a8d5a2;
        padding: 6px 16px;
        margin-bottom: 28px;
      }
      .label-badge span {
        font-size: 11px;
        color: #2D5A27;
        font-weight: 700;
        letter-spacing: 0.15em;
      }
      .main-title {
        font-family: 'Shippori Mincho', serif;
        font-size: 44px;
        color: #1A2E1A;
        font-weight: 700;
        line-height: 1.3;
        margin-bottom: 20px;
      }
      .main-title .accent { color: #2D5A27; }
      .subtitle {
        font-family: 'Noto Sans JP', sans-serif;
        font-size: 16px;
        color: #555;
        line-height: 1.8;
        margin-bottom: 36px;
        font-weight: 300;
      }
      .tag-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }
      .tag {
        font-size: 12px;
        padding: 6px 16px;
        border: 1px solid #2D5A27;
        color: #2D5A27;
        font-family: 'Noto Sans JP', sans-serif;
        font-weight: 700;
        letter-spacing: 0.05em;
      }
      .doc-info {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .doc-info-line {
        width: 32px; height: 1px;
        background: #B8960C;
      }
      .doc-info-text {
        font-size: 12px;
        color: #888;
        font-family: 'Noto Sans JP', sans-serif;
        letter-spacing: 0.05em;
      }
    </style>
</head>
<body>
<div class="slide-container">
  <!-- Left Panel -->
  <div class="left-panel">
    <div class="botanical-circle bc1"></div>
    <div class="botanical-circle bc2"></div>
    <div class="botanical-circle bc3"></div>
    <div class="gold-line-h" style="top: 25%;"></div>
    <div class="gold-line-h" style="top: 75%;"></div>
    <div class="left-content">
      <div class="brand-s"><span>S</span></div>
      <div class="brand-name-jp">スカルプラボ</div>
      <div class="brand-name-en">Scalp Labo</div>
      <div class="gold-divider"></div>
      <div class="presented-by">Presented by</div>
      <div class="company-name">THE HERBS</div>
    </div>
  </div>
  <!-- Right Panel -->
  <div class="right-panel">
    <div class="label-badge">
      <span>LINE登録者限定資料</span>
    </div>
    <h1 class="main-title">
      スカルプラボ<br>
      <span class="accent">パートナープログラム</span>
    </h1>
    <p class="subtitle">
      予防型ヘルスケア × 習慣化事業として、<br>
      あなたのサロンに新しい収益の柱を。
    </p>
    <div class="tag-row">
      <span class="tag">ブルーオーシャン市場</span>
      <span class="tag">定期チェック習慣化</span>
      <span class="tag">植物由来ケア</span>
    </div>
    <div class="doc-info">
      <div class="doc-info-line"></div>
      <span class="doc-info-text">株式会社THE HERBS ／ スカルプラボ事業部</span>
    </div>
  </div>
</div>
</body>
</html>
